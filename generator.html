<!DOCTYPE html>
<html>

<head>

<title>AI Generator</title>

<style>

body{
background:#050816;
color:#00ffff;
font-family:Arial;
text-align:center;
padding-top:100px;
}

h1{
font-size:60px;
text-shadow:0 0 20px #00ffff;
}

textarea{
width:400px;
height:150px;
padding:20px;
font-size:18px;
border:none;
border-radius:15px;
margin-top:30px;
}

button{
padding:15px 30px;
background:#00ffff;
border:none;
border-radius:10px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:25px;
}

</style>

</head>

<body>

<h1>AI GENERATOR 🚀</h1>

<textarea id="idea" placeholder="Type futuristic idea..."></textarea>

<br>

<button onclick="generateIdea()">
Generate
</button>

<div id="result"></div>

<script>

function generateIdea(){

const text =
document.getElementById("idea").value;

document.getElementById("result").innerHTML =
"🚀 Futuristic AI Generated: " + text;

}

</script>

</body>

</html>
