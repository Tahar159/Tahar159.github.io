<!DOCTYPE html>
<html>
<head>

<title>AI Generator</title>

<style>

#gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
justify-content:center;
}

.image-box{
position:relative;
width:120px;
height:120px;
border-radius:10px;
overflow:hidden;
border:2px solid cyan;
cursor:pointer;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.image-box button{
position:absolute;
top:5px;
right:5px;
padding:5px;
font-size:12px;
border:none;
border-radius:5px;
background:red;
color:white;
cursor:pointer;
}

body{
background:#050816;
font-family:Arial;
color:white;
text-align:center;
padding-top:50px;
}

.container{
width:500px;
margin:auto;
background:#0b1228;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px cyan;
}

h1{
color:cyan;
margin-bottom:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:cyan;
color:black;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

input{
margin:20px;
}

video{
width:100%;
border-radius:20px;
margin-top:20px;
display:none;
}

canvas{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Image Upload</h1>

<!-- Upload Image -->
<input type="file" id="imageInput" accept="image/*">

<br>

<!-- Open Camera -->
<button onclick="openCamera()">
Take Photo
</button>

<!-- Capture Photo -->
<button onclick="capturePhoto()">
Capture
</button>
<button onclick="stopCamera()">
Stop Camera
</button>
<br>

<!-- Camera -->
<video id="video" autoplay></video>

<!-- Hidden Canvas -->
<canvas id="canvas"></canvas>

<!-- Preview -->
<div id="gallery"></div>

</div>

<script>

const imageInput = document.getElementById("imageInput");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
let cameraStream;
let images = [];

// Upload Image
imageInput.addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){
addImage(e.target.result);
}

reader.readAsDataURL(file);

}

});


// Open Camera
async function openCamera(){

try{

cameraStream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = cameraStream;
video.style.display = "block";

}catch(error){

alert("Camera permission denied!");

}

}


// Capture Photo
function capturePhoto(){

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video, 0, 0);

const imageData = canvas.toDataURL("image/png");
addImage(imageData);

}
function stopCamera(){

if(cameraStream){

cameraStream.getTracks().forEach(track => {
track.stop();
});

video.style.display = "none";

}

}
  function addImage(src){
images.push(src);
renderGallery();
}
  function renderGallery(){

const gallery = document.getElementById("gallery");
gallery.innerHTML = "";

images.forEach((img, index)=>{

const div = document.createElement("div");
div.className = "image-box";

div.innerHTML = `
<img src="${img}" onclick="selectImage(${index})">
<button onclick="deleteImage(${index})">X</button>
`;

gallery.appendChild(div);

});

}
  function selectImage(index){
alert("Selected image #" + (index + 1));
}

function deleteImage(index){
images.splice(index, 1);
renderGallery();
}
</script>

</body>
</html>
