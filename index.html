<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:black;
color:white;
}

/* Moving animated background */

.background{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(45deg,#0f0c29,#302b63,#24243e);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
z-index:-2;
}

@keyframes bgMove{

0%{
background-position:left;
}

100%{
background-position:right;
}

}

/* Floating circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 10s infinite linear;
}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-120vh);
}

}

/* Main content */

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

/* Profile image */

.profile{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
box-shadow:0 0 30px rgba(255,255,255,0.5);
margin-bottom:20px;
animation:zoom 3s infinite alternate;
}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.05);
}

}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
font-size:22px;
opacity:0.8;
margin-bottom:30px;
}

/* Buttons */

.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
transition:0.3s;
background:white;
color:black;
font-weight:bold;
}

button:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 10px 20px rgba(255,255,255,0.3);
}

/* Glass card */

.card{
margin-top:40px;
width:300px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
transition:0.4s;
}

.card:hover{
transform:rotateY(10deg) rotateX(10deg);
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<img src="myphoto.png" class="profile">

<h1>Welcome 🚀</h1>

<p>My futuristic website</p>

<div class="buttons">

<button onclick="alert('Welcome!')">
Enter
</button>

<button onclick="window.location.reload()">
Refresh
</button>

</div>

<div class="card">

<h2>About Me</h2>

<p>
I am learning web development and creating amazing futuristic websites.
</p>

</div>

</div>

<script>

/* Create floating circles */

for(let i=0;i<30;i++){

let circle=document.createElement("div");

circle.classList.add("circle");

let size=Math.random()*80;

circle.style.width=size+"px";
circle.style.height=size+"px";

circle.style.left=Math.random()*100+"vw";

circle.style.animationDuration=
(5+Math.random()*10)+"s";

document.body.appendChild(circle);

}

</script>

</body>
</html>
