<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>My Cool Website</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #141e30, #243b55);
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 100px;
      font-size: 60px;
    }

    p {
      font-size: 22px;
    }

    button {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #ff4b2b;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff416c;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: float 10s infinite;
    }

    @keyframes float {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-120vh);
      }
    }

    .firework {
      position: absolute;
      width: 10px;
      height: 10px;
      background: yellow;
      border-radius: 50%;
      animation: explode 1s forwards;
    }

    @keyframes explode {
      from {
        transform: scale(1);
        opacity: 1;
      }

      to {
        transform: scale(15);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>Welcome 🚀</h1>

  <p>This is my first cool website!</p>

  <button onclick="showFirework(event)">
    Click Me
  </button>

  <script>

    // Floating bubbles
    for(let i = 0; i < 20; i++) {

      let bubble = document.createElement("div");

      bubble.classList.add("bubble");

      let size = Math.random() * 60;

      bubble.style.width = size + "px";
      bubble.style.height = size + "px";

      bubble.style.left = Math.random() * 100 + "vw";

      bubble.style.animationDuration =
        (5 + Math.random() * 10) + "s";

      document.body.appendChild(bubble);
    }

    // Firework effect
    function showFirework(event) {

      let firework = document.createElement("div");

      firework.classList.add("firework");

      firework.style.left = event.clientX + "px";
      firework.style.top = event.clientY + "px";

      document.body.appendChild(firework);

      setTimeout(() => {
        firework.remove();
      }, 1000);
    }

    document.addEventListener("click", showFirework);

  </script>

</body>
</html>
