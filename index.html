<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futuristic Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
font-family:Arial;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

/* Animated background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle,#1a1a40,#050816,#000);
animation:bgMove 20s infinite linear;
z-index:-2;
}

@keyframes bgMove{

0%{
transform:translate(0,0);
}

50%{
transform:translate(-10%,-10%);
}

100%{
transform:translate(0,0);
}

}

/* Navbar */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ffff;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

nav a:hover{
color:#00ffff;
}

/* Hero section */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.profile{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid #00ffff;
box-shadow:0 0 30px #00ffff;
margin-bottom:20px;
animation:float 3s infinite alternate;
}

@keyframes float{

from{
transform:translateY(0);
}

to{
transform:translateY(-15px);
}

}

.hero h1{
font-size:70px;
margin-bottom:15px;
}

.hero p{
font-size:24px;
opacity:0.8;
}

/* Buttons */

.buttons{
margin-top:30px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#00ffff;
color:black;
font-size:18px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ffff;
}

/* Cards section */

.section{
padding:100px 50px;
text-align:center;
}

.section h2{
font-size:50px;
margin-bottom:50px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
width:300px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
transition:0.5s;
transform-style:preserve-3d;
}

.card:hover{
transform:rotateY(15deg) rotateX(10deg) scale(1.05);
box-shadow:0 0 30px rgba(0,255,255,0.5);
}

.card h3{
margin-bottom:20px;
font-size:28px;
}

/* Contact form */

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
}

input,textarea{
padding:15px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
}

textarea{
height:150px;
resize:none;
}

/* AI Chat Button */

.chatbot{
position:fixed;
bottom:30px;
right:30px;
width:70px;
height:70px;
border-radius:50%;
background:#00ffff;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
box-shadow:0 0 20px #00ffff;
transition:0.3s;
}

.chatbot:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<!-- Navbar -->

<nav>

<div class="logo">TAHAR</div>

<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>

<!-- Hero -->

<section class="hero" id="home">

<img src="myphoto.png" class="profile">

<h1>Welcome 🚀</h1>

<p>Future Web Developer & Designer</p>

<div class="buttons">

<button onclick="alert('Welcome to my website!')">
Explore
</button>

<button onclick="window.scrollTo(0,document.body.scrollHeight)">
Contact Me
</button>

</div>

</section>

<!-- Projects -->

<section class="section" id="projects">

<h2>My Projects</h2>

<div class="cards">

<div class="card">
<h3>AI Website</h3>
<p>Modern futuristic AI website project.</p>
</div>

<div class="card">
<h3>3D Animation</h3>
<p>Interactive 3D animation effects project.</p>
</div>

<div class="card">
<h3>Game Project</h3>
<p>JavaScript mini game development.</p>
</div>

</div>

</section>

<!-- Contact -->

<section class="section" id="contact">

<h2>Contact Me</h2>

<form action="https://formspree.io/f/yourformid" method="POST">

<input type="text" placeholder="Tahar" required>

<input type="email" placeholder="taharbouguern77@gmail.com" required>

<textarea placeholder="im Tahar jianghan university student"></textarea>

<button type="submit">
Send Message
</button>

</form>

</section>

<!-- Chatbot -->

<div class="chatbot"
onclick="alert('AI Chatbot Coming Soon 🤖')">

🤖

</div>

</body>
</html>
