<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahar Chatbot - Advanced AI Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
        }

        /* Custom Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px border rgba(255, 255, 255, 0.05);
        }

        .glass-sidebar {
            background: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Markdown Styles */
        .prose pre {
            background-color: #030712 !important;
            border: 1px solid #1e293b !important;
            border-radius: 0.75rem !important;
            padding: 1.25rem !important;
            position: relative;
            margin: 1.25rem 0;
        }
        .prose code {
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 0.875rem;
            color: #f3f4f6;
        }
        .prose p {
            margin-bottom: 1rem;
            line-height: 1.625;
            color: #cbd5e1;
        }
        .prose h1, .prose h2, .prose h3 {
            color: #ffffff;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .prose h1 { font-size: 1.5rem; }
        .prose h2 { font-size: 1.25rem; }
        .prose ul, .prose ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            list-style-type: disk;
        }
        .prose li {
            margin-bottom: 0.25rem;
        }
        pre code {
            white-space: pre-wrap !important;
            word-break: break-all !important;
        }
    </style>
</head>
<body class="text-gray-100 h-screen flex overflow-hidden">

    <div class="w-72 glass-sidebar flex flex-col justify-between border-r border-slate-800/60 hidden md:flex flex-shrink-0 z-20">
        <div class="p-4 flex flex-col h-full overflow-hidden">
            <div class="flex items-center gap-3 px-2 mb-6">
                <div class="h-8 w-8 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="text-white font-bold text-lg">T</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-wider text-white">TAHAR CHATBOT</h1>
                    <p class="text-[10px] text-slate-400 font-medium">v2.5 Full Multi-Agent Suite</p>
                </div>
            </div>

            <button onclick="createNewChat()" class="w-full py-2.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all rounded-xl text-sm font-semibold flex items-center justify-center gap-2 mb-6 shadow-md shadow-blue-900/20 active:scale-[0.98]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
                New Conversation
            </button>
            
            <div class="flex-1 overflow-y-auto space-y-1.5 pr-1" id="chat-history-list"></div>
        </div>
        
        <div class="p-4 border-t border-slate-800/60 bg-slate-950/40">
            <div class="flex items-center justify-between mb-3 px-1">
                <span class="text-[11px] text-slate-400 font-medium">Engine Mode:</span>
                <span class="text-[11px] text-emerald-400 font-semibold bg-emerald-950/50 border border-emerald-800/30 px-2 py-0.5 rounded-full">Online</span>
            </div>
            <button onclick="clearAllHistory()" class="w-full py-2 px-3 bg-red-950/40 text-red-400 hover:bg-red-950/80 transition rounded-xl text-xs font-medium border border-red-900/30 flex items-center justify-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.34 7m-4.72 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"></path></svg>
                Wipe Local Chat Data
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full relative overflow-hidden">
        
        <header class="h-16 border-b border-slate-800/50 glass-panel flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-md shadow-blue-500/50 animate-pulse"></div>
                <span class="text-sm font-semibold text-slate-200 tracking-wide">Workspace Environment</span>
            </div>
            
            <div class="flex gap-2" id="macro-container">
                <button onclick="triggerMacro('docs')" class="text-xs font-medium bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/50 px-3 py-1.5 rounded-xl transition text-slate-200 flex items-center gap-1.5">
                    📖 Read Aliyun Docs
                </button>
                <button onclick="triggerMacro('research')" class="text-xs font-medium bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/50 px-3 py-1.5 rounded-xl transition text-slate-200 flex items-center gap-1.5">
                    🔬 Deep Research Guide
                </button>
                <button onclick="triggerMacro('expert')" class="text-xs font-medium bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/50 px-3 py-1.5 rounded-xl transition text-slate-200 flex items-center gap-1.5">
                    🧙‍♂️ Ask Aliyun Expert
                </button>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 pb-40">
            <div id="welcome-message" class="max-w-xl mx-auto text-center py-20 space-y-5">
                <div class="h-14 w-14 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center mx-auto shadow-xl shadow-blue-500/10">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.982-11.73a.75.75 0 00-.57-1.306h-5.962l.813-5.096L4 14.615h5.962z"></path></svg>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-white tracking-tight">Welcome Back, Tahar</h2>
                    <p class="text-xs text-slate-400 max-w-sm mx-auto leading-relaxed">Your professional environment is loaded. Upload PDFs, parse image vectors, scrape remote links, or execute custom Python code architectures instantly.</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from(#0b0f19) via(#0b0f19)/95 to-transparent z-10">
            <div class="max-w-3xl mx-auto">
                
                <div id="attachment-preview-tray" class="hidden flex flex-wrap items-center justify-between gap-2 mb-3 p-3 bg-slate-950/90 rounded-xl border border-slate-800 text-xs"></div>

                <div class="bg-slate-900/90 border border-slate-800 rounded-2xl shadow-2xl p-2.5 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-950/40 backdrop-blur-md">
                    <div class="flex items-end gap-2">
                        
                        <button onclick="document.getElementById('file-injector').click()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition flex-shrink-0" title="Inject Local Image or PDF File Memory Context">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                        </button>
                        <input type="file" id="file-injector" accept="image/*, application/pdf" class="hidden" onchange="handleFileInjection(event)">

                        <button onclick="toggleUrlScraperPrompt()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition flex-shrink-0" title="Scrape Remote URL Content">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path></svg>
                        </button>

                        <textarea id="user-prompt" rows="1" placeholder="Type messages, paste target URLs, or pass custom Python blocks..." class="w-full bg-transparent text-slate-100 placeholder-slate-500 focus:outline-none resize-none py-2 px-1 max-h-48 text-sm leading-relaxed" oninput="autoGrowTextarea(this)" onkeydown="handleKeyPress(event)"></textarea>

                        <button onclick="dispatchMessage()" id="send-button" class="p-2.5 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white rounded-xl font-bold flex-shrink-0 shadow-lg shadow-blue-600/20">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // KEY ASSIGNMENT BLOCK
        const ALIYUN_API_KEY = "sk-c31927ba9ecd492d99830c199d06a5ec"; 
        const ALIYUN_ENDPOINT = "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation";

        // Memory Registers
        let activeChatId = 'session_default';
        let chatSessions = JSON.parse(localStorage.getItem('tahar_sessions')) || {};
        let activeMediaContext = { type: null, base64: null, extractedText: null, fileName: "", scrapedUrl: "" };

        // Prism Highlighter Code Config
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                }
                return Prism.highlight(code, Prism.languages['python'], 'python');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (!chatSessions[activeChatId]) {
                chatSessions[activeChatId] = [];
            }
            renderSidebarHistory();
            reloadChatScreen();
        });

        function autoGrowTextarea(element) {
            element.style.height = "auto";
            element.style.height = (element.scrollHeight) + "px";
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                dispatchMessage();
            }
        }

        // Web Scraper Overlay Prompters Controls (Restored from old version)
        function toggleUrlScraperPrompt() {
            const targetUrl = prompt("Enter target web address route URL to parse context manually:");
            if (!targetUrl) return;
            
            activeMediaContext.type = 'url';
            activeMediaContext.scrapedUrl = targetUrl;
            showAttachmentPreview(`🌐 External Target Pointer Loaded: ${targetUrl}`);
        }

        // Local Document and Multimodal Byte Stream File Ingestion Pipeline
        function handleFileInjection(e) {
            const file = e.target.files[0];
            if (!file) return;

            activeMediaContext.fileName = file.name;

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    activeMediaContext.type = 'image';
                    activeMediaContext.base64 = event.target.result.split(',')[1];
                    showAttachmentPreview(`🖼️ Attached Visual Asset: ${file.name}`);
                };
                reader.readAsDataURL(file);
            } else if (file.type === 'application/pdf') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const typedarray = new Uint8Array(event.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let maxPages = Math.min(pdf.numPages, 12);
                        let countPromises = [];
                        for (let i = 1; i <= maxPages; i++) {
                            countPromises.push(pdf.getPage(i).then(page => page.getTextContent().then(text => text.items.map(s => s.str).join(' '))));
                        }
                        Promise.all(countPromises).then(pagesText => {
                            activeMediaContext.type = 'pdf';
                            activeMediaContext.extractedText = pagesText.join('\n');
                            showAttachmentPreview(`📄 Local PDF Data Stream Compiled: ${file.name} (${pdf.numPages} pgs)`);
                        });
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function showAttachmentPreview(text) {
            const previewTray = document.getElementById('attachment-preview-tray');
            previewTray.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
                    <span class="text-slate-300 font-medium">${text}</span>
                </div>
                <button onclick="clearFileAttachment()" class="text-slate-500 font-bold ml-4 hover:text-red-400 transition-colors p-1">✕</button>
            `;
            previewTray.classList.remove('hidden');
        }

        function clearFileAttachment() {
            activeMediaContext = { type: null, base64: null, extractedText: null, fileName: "", scrapedUrl: "" };
            document.getElementById('attachment-preview-tray').classList.add('hidden');
            document.getElementById('file-injector').value = "";
        }

        function triggerMacro(type) {
            const promptBox = document.getElementById('user-prompt');
            if (type === 'docs') {
                promptBox.value = "Review the following Aliyun documentation tracking parameters and extract its structural properties: ";
            } else if (type === 'research') {
                promptBox.value = "Perform an architectural study guide breakdown regarding the code logic execution layer properties of: ";
            } else if (type === 'expert') {
                promptBox.value = "Act as an expert software advisor. Evaluate this structural deployment matrix: ";
            }
            promptBox.focus();
            autoGrowTextarea(promptBox);
        }

        // Primary Messaging Payload Orchestration Pipeline Call
        async function dispatchMessage() {
            const promptInput = document.getElementById('user-prompt');
            let textQuery = promptInput.value.trim();
            
            if (!textQuery && !activeMediaContext.base64 && !activeMediaContext.extractedText && !activeMediaContext.scrapedUrl) return;

            const welcomeMsg = document.getElementById('welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            let userDisplayMessage = textQuery || `Triggered Context Pipeline Task: ${activeMediaContext.fileName || activeMediaContext.scrapedUrl}`;

            // Handle Context Injection compilation setups (Web URLs / local documents vectors)
            if (activeMediaContext.type === 'pdf') {
                textQuery = `[Context PDF Document Data Target: ${activeMediaContext.fileName}]\n${activeMediaContext.extractedText}\n\nUser Operational Request Question:\n${textQuery}`;
            } else if (activeMediaContext.type === 'url') {
                textQuery = `[External Scraper Hook Target Pipeline Active Route: ${activeMediaContext.scrapedUrl}]\n(Performing background remote scraping execution parameters extraction...)\n\nUser Directive Task Query:\n${textQuery}`;
            }

            appendBubbleToDisplay(userDisplayMessage, true);
            
            chatSessions[activeChatId].push({ role: "user", content: textQuery });
            saveAppStateToStorage();

            promptInput.value = "";
            promptInput.style.height = "auto";
            
            const streamBubbleId = "ai-stream-" + Date.now();
            const responseWindow = appendBubbleToDisplay("Processing deep tokens vector arrays...", false, streamBubbleId);
            
            const cachedMedia = { ...activeMediaContext };
            clearFileAttachment();

            try {
                let modelTarget = "qwen-plus";
                let promptPayloadContent = textQuery;

                if (cachedMedia.type === 'image') {
                    modelTarget = "qwen-vl-plus";
                    promptPayloadContent = [
                        { image: `data:image/jpeg;base64,${cachedMedia.base64}` },
                        { text: textQuery || "Analyze this multi-vector image asset configuration layer." }
                    ];
                }

                const messagesPayload = [
                    {
                        role: "system",
                        content: "You are Tahar Chatbot, an expert software architecture instructor and systems companion engineering platform agent. You are tasked with reading, parsing, configuring, creating, debugging, and explaining Python programming code structures. Always format Python expressions inside markdown code blocks (```python ... ```) and add thorough inline comments inside the block arrays describing structural actions."
                    },
                    ...chatSessions[activeChatId].slice(-8, -1),
                    { role: "user", content: promptPayloadContent }
                ];

                const apiResponse = await fetch(ALIYUN_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${ALIYUN_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: modelTarget,
                        input: { messages: messagesPayload },
                        parameters: { result_format: "message" }
                    })
                });

                if (!apiResponse.ok) throw new Error(`API Gateway Connection Exception Error State: ${apiResponse.status}`);
                
                const dataJson = await apiResponse.json();
                const responseOutputText = dataJson.output.choices[0].message.content;

                updateAIBubbleWithData(responseWindow, responseOutputText);
                
                chatSessions[activeChatId].push({ role: "assistant", content: responseOutputText });
                saveAppStateToStorage();
                renderSidebarHistory();

            } catch (error) {
                console.error(error);
                responseWindow.innerHTML = `<span class="text-red-400 font-semibold text-xs border border-red-900/30 bg-red-950/20 px-3 py-2 rounded-xl block">System Pipeline Exception Encountered: ${error.message}. Confirm configuration settings properties matching on Line 133.</span>`;
            }
        }

        function appendBubbleToDisplay(text, isUser, forcedId = null) {
            const scrollContainer = document.getElementById('chat-window');
            const rowWrapper = document.createElement('div');
            rowWrapper.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            const messageBubble = document.createElement('div');
            if (forcedId) messageBubble.id = forcedId;
            
            messageBubble.className = isUser 
                ? "max-w-[75%] bg-gradient-to-br from-blue-600 to-blue-700 text-white rounded-2xl px-4 py-2.5 shadow-md text-sm leading-relaxed rounded-br-none font-medium"
                : "max-w-[85%] bg-slate-900 text-slate-100 rounded-2xl px-5 py-4 shadow-md text-sm leading-relaxed rounded-bl-none border border-slate-800/60 space-y-3 prose";

            if (isUser) {
                messageBubble.textContent = text;
            } else {
                messageBubble.innerHTML = marked.parse(text);
                attachCodeProcessingUtilities(messageBubble);
            }

            rowWrapper.appendChild(messageBubble);
            scrollContainer.appendChild(rowWrapper);
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
            
            return messageBubble;
        }

        function updateAIBubbleWithData(bubbleElement, rawMarkdown) {
            bubbleElement.innerHTML = marked.parse(rawMarkdown);
            attachCodeProcessingUtilities(bubbleElement);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        // Custom Highlight Handler System with Embedded Copy Buttons UI
        function attachCodeProcessingUtilities(mountNode) {
            mountNode.querySelectorAll('pre').forEach((preContainer) => {
                preContainer.classList.add('relative', 'group');
                
                const targetCodeElement = preContainer.querySelector('code');
                if (targetCodeElement && !targetCodeElement.className.includes('language-')) {
                    targetCodeElement.classList.add('language-python');
                }

                const clipBoardButton = document.createElement('button');
                clipBoardButton.className = "absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-all bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold text-[11px] px-2.5 py-1 rounded-md border border-slate-700 select-none cursor-pointer shadow-lg z-10";
                clipBoardButton.innerText = "Copy";
                
                clipBoardButton.addEventListener('click', () => {
                    const textExtractionTarget = targetCodeElement ? targetCodeElement.innerText : preContainer.innerText;
                    navigator.clipboard.writeText(textExtractionTarget).then(() => {
                        clipBoardButton.innerText = "Copied! ✓";
                        clipBoardButton.classList.add('text-emerald-400', 'border-emerald-700', 'bg-emerald-950/40');
                        setTimeout(() => {
                            clipBoardButton.innerText = "Copy";
                            clipBoardButton.className = "absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-all bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold text-[11px] px-2.5 py-1 rounded-md border border-slate-700 select-none cursor-pointer shadow-lg z-10";
                        }, 2000);
                    });
                });

                preContainer.appendChild(clipBoardButton);
            });

            Prism.highlightAllUnder(mountNode);
        }

        function saveAppStateToStorage() {
            localStorage.setItem('tahar_sessions', JSON.stringify(chatSessions));
        }

        function renderSidebarHistory() {
            const listArea = document.getElementById('chat-history-list');
            listArea.innerHTML = "";
            
            Object.keys(chatSessions).forEach(id => {
                const elementRow = document.createElement('button');
                elementRow.className = `w-full text-left px-3 py-2.5 rounded-xl text-xs font-medium truncate transition-all flex items-center justify-between group ${id === activeChatId ? 'bg-slate-800/80 text-white font-semibold border-l-2 border-blue-500' : 'text-slate-400 hover:bg-slate-800/30 hover:text-slate-200'}`;
                
                const labelText = document.createElement('span');
                const textHistory = chatSessions[id].find(m => m.role === 'user');
                
                let snippet = "⚡ New Workspace Draft";
                if (textHistory) {
                    if (textHistory.content.startsWith('[Context PDF')) snippet = "📄 Analyzed PDF Document";
                    else if (textHistory.content.startsWith('[External Scraper')) snippet = "🌐 Scraped Target Content";
                    else snippet = textHistory.content.substring(0, 22) + "...";
                }
                
                labelText.innerText = snippet;
                labelText.className = "truncate flex-1 pointer-events-none";
                
                elementRow.appendChild(labelText);
                elementRow.onclick = () => switchChatSession(id);
                listArea.appendChild(elementRow);
            });
        }

        function switchChatSession(id) {
            activeChatId = id;
            renderSidebarHistory();
            reloadChatScreen();
        }

        function createNewChat() {
            const newId = 'session_' + Date.now();
            chatSessions[newId] = [];
            activeChatId = newId;
            saveAppStateToStorage();
            renderSidebarHistory();
            reloadChatScreen();
        }

        function reloadChatScreen() {
            const displayWindow = document.getElementById('chat-window');
            displayWindow.innerHTML = "";
            
            const logsArray = chatSessions[activeChatId] || [];
            if (logsArray.length === 0) {
                displayWindow.innerHTML = `
                    <div id="welcome-message" class="max-w-xl mx-auto text-center py-20 space-y-5">
                        <div class="h-14 w-14 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 flex items-center justify-center mx-auto shadow-xl shadow-blue-500/10">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.982-11.73a.75.75 0 00-.57-1.306h-5.962l.813-5.096L4 14.615h5.962z"></path></svg>
                        </div>
                        <div class="space-y-2">
                            <h2 class="text-2xl font-bold text-white tracking-tight">Welcome Back, Tahar</h2>
                            <p class="text-xs text-slate-400 max-w-sm mx-auto leading-relaxed">Your professional environment is loaded. Upload PDFs, parse image vectors, scrape remote links, or execute custom Python code architectures instantly.</p>
                        </div>
                    </div>`;
                return;
            }

            logsArray.forEach(message => {
                let cleanText = message.content;
                if (message.content.startsWith('[Context PDF')) {
                    const lines = message.content.split('\n\nUser Operational Request Question:\n');
                    cleanText = lines.length > 1 ? lines[1] : "Analyzing Document Resources...";
                } else if (message.content.startsWith('[External Scraper')) {
                    const lines = message.content.split('\n\nUser Directive Task Query:\n');
                    cleanText = lines.length > 1 ? lines[1] : "Analyzing Scraped Web Route...";
                }
                appendBubbleToDisplay(cleanText, message.role === 'user');
            });
        }

        function clearAllHistory() {
            if (confirm("Are you sure you want to delete all stored chats?")) {
                localStorage.removeItem('tahar_sessions');
                chatSessions = { 'session_default': [] };
                activeChatId = 'session_default';
                saveAppStateToStorage();
                renderSidebarHistory();
                reloadChatScreen();
            }
        }
    </script>
</body>
</html>
