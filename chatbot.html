<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahar Chatbot - Pro AI Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <style>
        /* Smooth custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        /* Stop code text from spilling out horizontally on small screens */
        pre code { white-space: pre-wrap !important; word-break: break-all !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">

    <div class="w-64 bg-gray-950 flex flex-col justify-between border-r border-gray-800 hidden md:flex flex-shrink-0">
        <div class="p-4 flex flex-col h-full overflow-hidden">
            <button onclick="createNewChat()" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 transition rounded-lg text-sm font-semibold flex items-center justify-center gap-2 mb-4 shadow-lg shadow-blue-900/20">
                <span>+</span> New Chat
            </button>
            
            <div class="flex-1 overflow-y-auto space-y-1 pr-1" id="chat-history-list"></div>
        </div>
        
        <div class="p-4 border-t border-gray-800 bg-gray-950/50">
            <div class="text-xs text-gray-400 mb-2">Engine: Aliyun Qwen Platform</div>
            <button onclick="clearAllHistory()" class="w-full py-1.5 px-3 bg-red-950 text-red-400 hover:bg-red-900 transition rounded text-xs border border-red-800/50">
                Clear All History
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full relative bg-gray-900">
        
        <header class="h-14 border-b border-gray-800 bg-gray-900/80 backdrop-blur flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                <h1 class="text-md font-bold tracking-wide text-gray-200">TAHAR CHATBOT</h1>
            </div>
            
            <div class="flex gap-2" id="macro-container">
                <button onclick="triggerMacro('docs')" class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1 rounded-full transition text-gray-300">📄 Read Aliyun Docs</button>
                <button onclick="triggerMacro('research')" class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1 rounded-full transition text-gray-300">🔬 Deep Research</button>
                <button onclick="triggerMacro('expert')" class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1 rounded-full transition text-gray-300">🧙‍♂️ Aliyun Expert</button>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 pb-36">
            <div id="welcome-message" class="max-w-2xl mx-auto text-center py-12 space-y-4">
                <h2 class="text-3xl font-extrabold text-white tracking-tight">How can I help you today, Tahar?</h2>
                <p class="text-sm text-gray-400 max-w-md mx-auto">Ask me any question! I can read your PDFs, process images, and read, write, format, or debug Python scripts smoothly.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-900 via-gray-900 to-transparent">
            <div class="max-w-3xl mx-auto">
                
                <div id="attachment-preview-tray" class="hidden flex flex-wrap gap-2 mb-2 p-2 bg-gray-950/80 rounded-xl border border-gray-800 text-xs"></div>

                <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl p-2 transition-all focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-900/30">
                    <div class="flex items-end gap-2">
                        
                        <button onclick="document.getElementById('file-injector').click()" class="p-2.5 text-gray-400 hover:text-white hover:bg-gray-700 rounded-xl transition flex-shrink-0" title="Upload Image or PDF">
                            📎
                        </button>
                        <input type="file" id="file-injector" accept="image/*, application/pdf" class="hidden" onchange="handleFileInjection(event)">

                        <textarea id="user-prompt" rows="1" placeholder="Type your message, ask questions, or paste Python code here..." class="w-full bg-transparent text-gray-100 placeholder-gray-500 focus:outline-none resize-none py-2 px-1 max-h-48 text-sm leading-relaxed" oninput="autoGrowTextarea(this)" onkeydown="handleKeyPress(event)"></textarea>

                        <button onclick="dispatchMessage()" id="send-button" class="p-2.5 bg-blue-600 hover:bg-blue-500 transition text-white rounded-xl font-bold flex-shrink-0 shadow-md">
                            ➔
                        </button>
                    </div>
                </div>
                <div class="text-[10px] text-center text-gray-500 mt-2">Tahar Chatbot Client Engine • Connected to Aliyun Architecture</div>
            </div>
        </div>

    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // PLACE YOUR ALIYUN API KEY RIGHT HERE
        const ALIYUN_API_KEY = "sk-c31927ba9ecd492d99830c199d06a5ec"; 
        const ALIYUN_ENDPOINT = "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation";

        // App States
        let activeChatId = 'session_default';
        let chatSessions = JSON.parse(localStorage.getItem('tahar_sessions')) || {};
        let activeMediaContext = { type: null, base64: null, extractedText: null, fileName: "" };

        // Configure Marked to use Prism syntax highlighting 
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                }
                return Prism.highlight(code, Prism.languages['python'], 'python');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (!chatSessions[activeChatId]) {
                chatSessions[activeChatId] = [];
            }
            renderSidebarHistory();
            reloadChatScreen();
        });

        function autoGrowTextarea(element) {
            element.style.height = "auto";
            element.style.height = (element.scrollHeight) + "px";
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                dispatchMessage();
            }
        }

        // Context File Processing Engine (FIXED)
        function handleFileInjection(e) {
            const file = e.target.files[0];
            if (!file) return;

            activeMediaContext.fileName = file.name;

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    activeMediaContext.type = 'image';
                    activeMediaContext.base64 = event.target.result.split(',')[1];
                    showAttachmentPreview(`🖼️ Image Attached: ${file.name}`);
                };
                reader.readAsDataURL(file);
            } else if (file.type === 'application/pdf') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const typedarray = new Uint8Array(event.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        let maxPages = Math.min(pdf.numPages, 10);
                        let countPromises = [];
                        for (let i = 1; i <= maxPages; i++) {
                            countPromises.push(pdf.getPage(i).then(page => page.getTextContent().then(text => text.items.map(s => s.str).join(' '))));
                        }
                        Promise.all(countPromises).then(pagesText => {
                            activeMediaContext.type = 'pdf';
                            activeMediaContext.extractedText = pagesText.join('\n');
                            showAttachmentPreview(`📄 PDF Text Extracted: ${file.name} (${pdf.numPages} Pages)`);
                        });
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function showAttachmentPreview(text) {
            const previewTray = document.getElementById('attachment-preview-tray');
            previewTray.innerHTML = `<span class="text-blue-400 font-medium">${text}</span><button onclick="clearFileAttachment()" class="text-red-400 font-bold ml-2 hover:text-red-300">✕</button>`;
            previewTray.classList.remove('hidden');
        }

        function clearFileAttachment() {
            activeMediaContext = { type: null, base64: null, extractedText: null, fileName: "" };
            document.getElementById('attachment-preview-tray').classList.add('hidden');
            document.getElementById('file-injector').value = "";
        }

        function triggerMacro(type) {
            const promptBox = document.getElementById('user-prompt');
            if (type === 'docs') {
                promptBox.value = "Review the following Aliyun documentation segment and outline its primary setups: ";
            } else if (type === 'research') {
                promptBox.value = "Perform a deep structural code and logical study guide breaking down this architectural topic: ";
            } else if (type === 'expert') {
                promptBox.value = "Act as an expert software advisor. Read and optimize this setup logic: ";
            }
            promptBox.focus();
            autoGrowTextarea(promptBox);
        }

        // Message Dispatch Pipeline Call (FIXED PIECE HERE)
        async function dispatchMessage() {
            const promptInput = document.getElementById('user-prompt');
            let textQuery = promptInput.value.trim();
            
            // FIXED condition: checking textQuery OR base64 OR extracted PDF text
            if (!textQuery && !activeMediaContext.base64 && !activeMediaContext.extractedText) return;

            const welcomeMsg = document.getElementById('welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            // Store clean display text for user bubble before appending context chunks
            let userDisplayMessage = textQuery || `Uploaded File: ${activeMediaContext.fileName}`;

            // Append PDF Context text seamlessly to history array
            if (activeMediaContext.type === 'pdf') {
                textQuery = `[Context Document: ${activeMediaContext.fileName}]\n${activeMediaContext.extractedText}\n\nUser Question:\n${textQuery}`;
            }

            // Display clear question bubble on screen
            appendBubbleToDisplay(userDisplayMessage, true);
            
            // Push item data to local history tracking
            chatSessions[activeChatId].push({ role: "user", content: textQuery });
            saveAppStateToStorage();

            promptInput.value = "";
            promptInput.style.height = "auto";
            
            const streamBubbleId = "ai-stream-" + Date.now();
            const responseWindow = appendBubbleToDisplay("Thinking deeply...", false, streamBubbleId);
            
            const cachedMedia = { ...activeMediaContext };
            clearFileAttachment();

            try {
                let modelTarget = "qwen-plus";
                let promptPayloadContent = textQuery;

                // FIXED: Set up proper multimodal array format for image inputs
                if (cachedMedia.type === 'image') {
                    modelTarget = "qwen-vl-plus";
                    promptPayloadContent = [
                        { image: `data:image/jpeg;base64,${cachedMedia.base64}` },
                        { text: textQuery || "Analyze this image payload content." }
                    ];
                }

                // AI System Rule Directive - Specialized for Python Processing
                const messagesPayload = [
                    {
                        role: "system",
                        content: "You are Tahar Chatbot, an expert programming instructor and advanced development companion. You excel at reading, creating, explaining, and troubleshooting Python code. Always format Python blocks correctly inside markdown tags (```python ... ```) and add clean, readable comments inside the scripts to explain how the code works."
                    },
                    ...chatSessions[activeChatId].slice(-6, -1), // Get previous history items
                    { role: "user", content: promptPayloadContent } // Inject correctly formatted payload
                ];

                const apiResponse = await fetch(ALIYUN_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${ALIYUN_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: modelTarget,
                        input: { messages: messagesPayload },
                        parameters: { result_format: "message" }
                    })
                });

                if (!apiResponse.ok) throw new Error(`API Connection Error Code: ${apiResponse.status}`);
                
                const dataJson = await apiResponse.json();
                const responseOutputText = dataJson.output.choices[0].message.content;

                updateAIBubbleWithData(responseWindow, responseOutputText);
                
                chatSessions[activeChatId].push({ role: "assistant", content: responseOutputText });
                saveAppStateToStorage();
                renderSidebarHistory();

            } catch (error) {
                console.error(error);
                responseWindow.innerHTML = `<span class="text-red-400 font-semibold">Engine Connection Disruption: ${error.message}. Double-check your Aliyun API Key entry on Line 131.</span>`;
            }
        }

        function appendBubbleToDisplay(text, isUser, forcedId = null) {
            const scrollContainer = document.getElementById('chat-window');
            const rowWrapper = document.createElement('div');
            rowWrapper.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const messageBubble = document.createElement('div');
            if (forcedId) messageBubble.id = forcedId;
            
            messageBubble.className = isUser 
                ? "max-w-[75%] bg-blue-600 text-white rounded-2xl px-4 py-2.5 shadow-md text-sm leading-relaxed rounded-br-none"
                : "max-w-[85%] bg-gray-800 text-gray-100 rounded-2xl px-5 py-3 shadow-md text-sm leading-relaxed rounded-bl-none border border-gray-700/50 space-y-3";

            if (isUser) {
                messageBubble.textContent = text;
            } else {
                messageBubble.innerHTML = marked.parse(text);
                attachCodeProcessingUtilities(messageBubble);
            }

            rowWrapper.appendChild(messageBubble);
            scrollContainer.appendChild(rowWrapper);
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
            
            return messageBubble;
        }

        function updateAIBubbleWithData(bubbleElement, rawMarkdown) {
            bubbleElement.innerHTML = marked.parse(rawMarkdown);
            attachCodeProcessingUtilities(bubbleElement);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        function attachCodeProcessingUtilities(mountNode) {
            mountNode.querySelectorAll('pre').forEach((preContainer) => {
                preContainer.classList.add('relative', 'group', 'my-3', 'rounded-xl', 'p-4', 'bg-gray-950', 'border', 'border-gray-800');
                
                const targetCodeElement = preContainer.querySelector('code');
                if (targetCodeElement && !targetCodeElement.className.includes('language-')) {
                    targetCodeElement.classList.add('language-python');
                }

                const clipBoardButton = document.createElement('button');
                clipBoardButton.className = "absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-all bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold text-[11px] px-2.5 py-1 rounded-md border border-gray-700 select-none";
                clipBoardButton.innerText = "Copy";
                
                clipBoardButton.addEventListener('click', () => {
                    const textExtractionTarget = targetCodeElement ? targetCodeElement.innerText : preContainer.innerText;
                    navigator.clipboard.writeText(textExtractionTarget).then(() => {
                        clipBoardButton.innerText = "Copied! ✓";
                        clipBoardButton.classList.add('text-emerald-400', 'border-emerald-700');
                        setTimeout(() => {
                            clipBoardButton.innerText = "Copy";
                            clipBoardButton.className = "absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-all bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold text-[11px] px-2.5 py-1 rounded-md border border-gray-700 select-none";
                        }, 2000);
                    });
                });

                preContainer.appendChild(clipBoardButton);
            });

            Prism.highlightAllUnder(mountNode);
        }

        function saveAppStateToStorage() {
            localStorage.setItem('tahar_sessions', JSON.stringify(chatSessions));
        }

        function renderSidebarHistory() {
            const listArea = document.getElementById('chat-history-list');
            listArea.innerHTML = "";
            
            Object.keys(chatSessions).forEach(id => {
                const elementRow = document.createElement('button');
                elementRow.className = `w-full text-left px-3 py-2 rounded-lg text-xs font-medium truncate transition flex items-center justify-between group ${id === activeChatId ? 'bg-gray-800 text-white font-semibold border-l-4 border-blue-500' : 'text-gray-400 hover:bg-gray-800/50 hover:text-gray-200'}`;
                
                const labelText = document.createElement('span');
                const textHistory = chatSessions[id].find(m => m.role === 'user');
                
                let snippet = "⚡ Empty Project Workspace";
                if (textHistory) {
                    snippet = textHistory.content.startsWith('[Context Document:') 
                        ? "📄 PDF Context Task"
                        : textHistory.content.substring(0, 22) + "...";
                }
                
                labelText.innerText = snippet;
                labelText.className = "truncate flex-1 pointer-events-none";
                
                elementRow.appendChild(labelText);
                elementRow.onclick = () => switchChatSession(id);
                listArea.appendChild(elementRow);
            });
        }

        function switchChatSession(id) {
            activeChatId = id;
            renderSidebarHistory();
            reloadChatScreen();
        }

        function createNewChat() {
            const newId = 'session_' + Date.now();
            chatSessions[newId] = [];
            activeChatId = newId;
            saveAppStateToStorage();
            renderSidebarHistory();
            reloadChatScreen();
        }

        function reloadChatScreen() {
            const displayWindow = document.getElementById('chat-window');
            displayWindow.innerHTML = "";
            
            const logsArray = chatSessions[activeChatId] || [];
            if (logsArray.length === 0) {
                displayWindow.innerHTML = `
                    <div id="welcome-message" class="max-w-2xl mx-auto text-center py-12 space-y-4">
                        <h2 class="text-3xl font-extrabold text-white tracking-tight">How can I help you today, Tahar?</h2>
                        <p class="text-sm text-gray-400 max-w-md mx-auto">Ask me any question! I can read your PDFs, process images, and read, write, format, or debug Python scripts smoothly.</p>
                    </div>`;
                return;
            }

            logsArray.forEach(message => {
                // If the stored string contains full PDF data chunking, format display look cleaner
                let cleanText = message.content;
                if (message.content.startsWith('[Context Document:')) {
                    const lines = message.content.split('\n\nUser Question:\n');
                    cleanText = lines.length > 1 ? lines[1] : "Analyzing PDF Document Setup...";
                }
                appendBubbleToDisplay(cleanText, message.role === 'user');
            });
        }

        function clearAllHistory() {
            if (confirm("Are you sure you want to delete all stored chats?")) {
                localStorage.removeItem('tahar_sessions');
                chatSessions = { 'session_default': [] };
                activeChatId = 'session_default';
                saveAppStateToStorage();
                renderSidebarHistory();
                reloadChatScreen();
            }
        }
    </script>
</body>
</html>
