<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Center</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 35%),
radial-gradient(circle at 80% 80%, rgba(120,0,255,0.15), transparent 35%),
radial-gradient(circle at 50% 50%, rgba(0,150,255,0.08), transparent 60%),
#050816;
color:white;
overflow-x:hidden;
min-height:100vh;
}
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:
radial-gradient(circle at 30% 30%, rgba(0,255,255,0.08), transparent 40%),
radial-gradient(circle at 70% 70%, rgba(255,0,255,0.06), transparent 40%);
animation: moveGlow 8s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
from{transform:scale(1);}
to{transform:scale(1.2);}
}
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.container{
position:relative;
z-index:1;
padding:60px 20px;
text-align:center;
max-width:1200px;
margin:auto;
}

h1{
font-size:80px;
font-weight:800;
letter-spacing:3px;
color:white;
text-shadow:
0 0 10px #00ffff,
0 0 30px #00ffff,
0 0 60px #00ffff;
margin-bottom:20px;
}
/* AVATAR */
#avatar{
width:220px;
height:220px;
border-radius:50%;
border:4px solid #00ffff;
box-shadow:
0 0 20px #00ffff,
0 0 50px #00ffff,
0 0 100px #00ffff55;
margin-top:20px;
animation:float 3s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px);}
to{transform:translateY(-15px);}
}

@keyframes talk{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* OLD CARDS (kept for safety) */
.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:50px;
}

.card{
width:300px;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
transition:0.4s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00ffff;
}

.card h2{
color:#00ffff;
}

/* ====== NEW FUTURISTIC AI UI ====== */

.ai-center{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:50px;
}

.ai-card{
width:320px;
padding:35px;
background:rgba(255,255,255,0.04);
border-radius:30px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
position:relative;
overflow:hidden;
transition:0.5s;
box-shadow:0 0 30px rgba(0,255,255,0.08);
}

.ai-card:hover{
transform:translateY(-15px) scale(1.05);
box-shadow:
0 0 20px #00ffff,
0 0 50px #00ffff;
border:1px solid #00ffff;
}

.ai-card h2{
color:#00ffff;
}

.glow{
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(45deg,transparent,#00ffff33,transparent);
animation:rotate 6s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.tag{
display:inline-block;
margin-top:15px;
padding:5px 10px;
border-radius:20px;
background:rgba(0,255,255,0.1);
border:1px solid rgba(0,255,255,0.4);
font-size:12px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px #00ffff;}
50%{box-shadow:0 0 20px #00ffff;}
100%{box-shadow:0 0 5px #00ffff;}
}

/* CHAT SECTION */
.chat{
margin-top:80px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

input{
width:78%;
padding:18px 20px;
font-size:18px;
color:white;

background:rgba(255,255,255,0.06);
border:1px solid rgba(0,255,255,0.25);

border-radius:18px;

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

outline:none;

box-shadow:
0 0 10px rgba(0,255,255,0.1),
inset 0 0 10px rgba(255,255,255,0.05);

transition:0.35s ease;

position:relative;
}
  input:focus{
border:1px solid #00ffff;

box-shadow:
0 0 15px #00ffff,
0 0 40px rgba(0,255,255,0.4),
inset 0 0 10px rgba(0,255,255,0.2);

transform:scale(1.02);
}
 
@keyframes inputGlow{
0%{
box-shadow:
0 0 10px rgba(0,255,255,0.1),
inset 0 0 10px rgba(255,255,255,0.05);
}
100%{
box-shadow:
0 0 20px rgba(0,255,255,0.25),
0 0 40px rgba(0,255,255,0.1),
inset 0 0 12px rgba(255,255,255,0.08);
}
}


button{
padding:15px 25px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#00ffff,#0088ff);
color:#001018;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,255,0.25);
transition:0.3s ease;
}
button.primary{
background:linear-gradient(135deg,#00ffff,#0066ff);
}

button.voice{
background:rgba(255,255,255,0.08);
color:white;
border:1px solid rgba(0,255,255,0.4);
backdrop-filter:blur(10px);
}

button.voice:hover{
background:rgba(0,255,255,0.15);
}
button:hover{
transform:scale(1.06);
box-shadow:
0 0 25px rgba(0,255,255,0.4),
0 0 60px rgba(0,255,255,0.2);
}
#response{
margin-top:30px;
padding:25px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,255,0.2);
min-height:120px;
box-shadow:0 0 20px rgba(0,255,255,0.15);
font-size:18px;
line-height:1.7;
}
  .buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.buttons button{
min-width:140px;
}
</style>
</head>

<body>
<canvas id="particles"></canvas>
<div class="container">

<h1>AI CENTER 🚀</h1>

<img src="ai-avatar.png" id="avatar">

<!-- FUTURISTIC AI CARDS -->
<div class="ai-center">

  <div class="ai-card" onclick="window.location.href='chatbot.html'">
    <div class="glow"></div>
    <h2>AI Chatbot</h2>
    <p>Advanced futuristic AI assistant.</p>
    <span class="tag">NEURAL CHAT 🤖</span>
  </div>

  <div class="ai-card" onclick="window.location.href='generator.html'">
    <div class="glow"></div>
    <h2>AI Generator</h2>
    <p>Create futuristic ideas and concepts.</p>
    <span class="tag">AI POWERED 🚀</span>
  </div>

  <div class="ai-card" onclick="window.location.href='dashboard.html'">
    <div class="glow"></div>
    <h2>AI Dashboard</h2>
    <p>Real-time hologram system.</p>
    <span class="tag">SYSTEM CORE ⚡</span>
  </div>

</div>

<!-- CHAT -->
<div class="chat">

<h2>🤖 Neural Assistant</h2>

<input type="text" id="prompt" placeholder="Ask AI anything...">

<div class="buttons">

<button class="primary" onclick="askAI()">🚀 Send</button>

<button class="voice" onclick="startVoice()">🎤 Speak</button>

</div>

<div id="response"></div>

</div>

</div>

<script>

async function askAI(){

const prompt =
document.getElementById("prompt").value;

const responseBox =
document.getElementById("response");

responseBox.innerHTML = "Thinking...";

try{

const response = await fetch(
"https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer sk-c31927ba9ecd492d99830c199d06a5ec"
},
body:JSON.stringify({
model:"qwen-plus",
messages:[
{
role:"user",
content:prompt
}
]
})
}
);

const data = await response.json();

const aiText =
data.choices[0].message.content;

responseBox.innerHTML = aiText;

const speech =
new SpeechSynthesisUtterance(aiText);

speech.lang = "en-US";
speech.rate = 1;
speech.pitch = 1;

const avatar =
document.getElementById("avatar");

avatar.style.animation = "talk 0.4s infinite";

speechSynthesis.speak(speech);

speech.onend = function(){
avatar.style.animation = "float 3s infinite alternate";
};

}
catch(error){
responseBox.innerHTML = "AI Error 🚨";
console.log(error);
}

}

/* ENTER KEY SUPPORT */
document.getElementById("prompt")
.addEventListener("keypress",function(e){
if(e.key === "Enter"){
askAI();
}
});

/* VOICE INPUT */
function startVoice(){

const recognition = new webkitSpeechRecognition();
recognition.lang = "en-US";
recognition.start();

recognition.onresult = function(event){
const speech = event.results[0][0].transcript;
document.getElementById("prompt").value = speech;
askAI();
};

}
const canvas = document.getElementById("particles");

if (!canvas) {
  console.warn("Particles canvas not found");
}
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2;
    this.speedX = Math.random() * 0.5 - 0.25;
    this.speedY = Math.random() * 0.5 - 0.25;
  }

  update(){
    this.x += this.speedX;
    this.y += this.speedY;

    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
    if(this.y < 0) this.y = canvas.height;
    if(this.y > canvas.height) this.y = 0;
  }

  draw(){
    ctx.fillStyle = "rgba(0,255,255,0.7)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles(){
  for(let i = 0; i < 80; i++){
    particlesArray.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i = 0; i < particlesArray.length; i++){
    particlesArray[i].update();
    particlesArray[i].draw();
  }

  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  particlesArray = [];
  initParticles();
});
</script>

</body>
</html>
